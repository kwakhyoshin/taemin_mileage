<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Diagnostic</title></head>
<body style="font-family:monospace;padding:20px;white-space:pre-wrap;background:#1e293b;color:#e2e8f0">
<h2>🔍 mile.ly Data Diagnostic</h2>
<div id="out">Loading...</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyDTS81EBGgiuo564ThxvTTOpR_iAHLb8tg",
  authDomain: "taemin-mileage.firebaseapp.com",
  projectId: "taemin-mileage",
  storageBucket: "taemin-mileage.appspot.com",
  messagingSenderId: "726aborned",
  appId: "1:726590093820:web:2a3d0c1f"
});
const db = getFirestore(app);
const out = document.getElementById('out');
let txt = '';
function log(s){ txt += s + '\n'; out.textContent = txt; }

async function run(){
  // 1. Legacy doc
  try{
    const snap = await getDoc(doc(db,'users','taemin_dev'));
    if(snap.exists()){
      const d = snap.data();
      log('=== users/taemin_dev ===');
      log('_migratedTo: ' + (d._migratedTo || 'none'));
      log('has familyMeta: ' + !!d.familyMeta);
      if(d.familyMeta){
        log('  familyId: ' + d.familyMeta.familyId);
        log('  familyName: ' + d.familyMeta.familyName);
        log('  plan: ' + (d.familyMeta.plan || 'undefined'));
        log('  createdBy: ' + d.familyMeta.createdBy);
        const mems = d.familyMeta.members || {};
        log('  members: ' + Object.keys(mems).join(', '));
        for(const [k,v] of Object.entries(mems)){
          log('    ' + k + ': name=' + v.name + ' type=' + v.type + ' isAdmin=' + v.isAdmin + ' authProv=' + (v.account?.authProvider||'none') + ' email=' + (v.account?.email||''));
        }
      }
      const users = d.users || {};
      log('  users: ' + Object.keys(users).join(', '));
      for(const [k,v] of Object.entries(users)){
        log('    ' + k + ': id=' + (v.id||'') + ' authProv=' + (v.authProvider||'none') + ' email=' + (v.email||''));
      }
    } else { log('users/taemin_dev: NOT FOUND'); }
  }catch(e){ log('Legacy error: ' + e.message); }

  // 2. families (dev_ docs)
  try{
    const fSnap = await getDocs(collection(db,'families'));
    log('\n=== families collection (dev_) ===');
    log('total: ' + fSnap.size);
    fSnap.forEach(d => {
      if(!d.id.startsWith('dev_')) return;
      const data = d.data();
      log('\ndoc: ' + d.id);
      log('has familyMeta: ' + !!data.familyMeta);
      if(data.familyMeta){
        log('  familyId: ' + data.familyMeta.familyId);
        log('  familyName: ' + data.familyMeta.familyName);
        log('  plan: ' + (data.familyMeta.plan || 'undefined'));
        log('  createdBy: ' + data.familyMeta.createdBy);
        const mems = data.familyMeta.members || {};
        log('  members: ' + Object.keys(mems).join(', '));
        for(const [k,v] of Object.entries(mems)){
          log('    ' + k + ': name=' + v.name + ' type=' + v.type + ' isAdmin=' + v.isAdmin + ' authProv=' + (v.account?.authProvider||'none'));
        }
      }
    });
  }catch(e){ log('Families error: ' + e.message); }
  log('\n✅ Done');
}
run();
</script>
</body></html>
