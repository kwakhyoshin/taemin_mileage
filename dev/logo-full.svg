<svg viewBox="0 0 320 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Icon — scaled from 200x200 center (100,100) to canvas point (45,50) at 0.4x -->
  <g transform="translate(45,50) scale(0.4)">
    <circle cx="0" cy="0" r="96" fill="url(#bgF)"/>
    <path d="M-38,50 L-38,-2 L0,-36 L38,-2 L38,50 Z" fill="#fff" opacity="0.96"/>
    <rect x="-13" y="18" width="26" height="32" rx="4" fill="#FF6B35"/>
    <circle cx="0" cy="-50" r="8" fill="#FF6B35"/>
  </g>
  <!-- Brand name -->
  <text x="90" y="42" font-family="'Nunito', -apple-system, BlinkMacSystemFont, sans-serif" font-size="34" font-weight="800" fill="#4F46E5" letter-spacing="-1">mile<tspan fill="#FF6B35">.</tspan>ly</text>
  <!-- Korean name -->
  <text x="91" y="62" font-family="'Noto Sans KR', -apple-system, sans-serif" font-size="13" font-weight="700" fill="#94A3B8" letter-spacing="1">마일리</text>
  <!-- Tagline -->
  <text x="91" y="78" font-family="'Noto Sans KR', -apple-system, sans-serif" font-size="10" font-weight="500" fill="#6EE7B7" letter-spacing="0.3">우리 가족의 마일리지 여정</text>
</svg>
